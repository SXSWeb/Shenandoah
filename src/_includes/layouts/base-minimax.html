<!-- A fully fleshed-out <head>, dynamically changing based on client.json and the page front matter -->

<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
        <link rel="stylesheet" href="/assets/minimax/css/main.css"/>
        <!-- https://realfavicongenerator.net/ -->
        <link rel="icon" type="image/png" href="/assets/favicons/favicon-180x180.png" sizes="180x180"/>
        <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg"/>
        <link rel="shortcut icon" href="/assets/favicons/favicon.ico"/>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">

        {% block head %}{% endblock %}
        <title>{{ title }}</title>
    </head>
    <body>
        <!--Screen reader skip main nav-->
        <!-- <a class="skip" aria-label="skip to main content" href="#main">Click To Skip To Main Content</a> -->

        {% include "sections/header-minimax.html" %}

        {% block body %}{% endblock %}

        {% include "sections/footer-minimax.html" %}

        <!-- Scripts -->
        <script src="/assets/minimax/js/jquery.min.js"></script>
        <script src="/assets/minimax/js/browser.min.js"></script>
        <script src="/assets/minimax/js/breakpoints.min.js"></script>
        <script src="/assets/minimax/js/util.js"></script>
        <script src="/assets/minimax/js/main.js"></script>

    </body>
</html>
