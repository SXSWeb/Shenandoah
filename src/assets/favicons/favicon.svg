<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#1C3557"/>

  <!-- Hill / wave shape at bottom -->
  <path d="M2 26 Q8 20 16 21 Q24 22 30 26 L30 32 L2 32 Z" fill="white" opacity="0.95"/>

  <!-- Left cross (smaller, tilted left) -->
  <g transform="translate(8, 14) rotate(-8)">
    <!-- vertical bar -->
    <rect x="-1" y="-6" width="2" height="12" fill="white"/>
    <!-- horizontal bar -->
    <rect x="-3.5" y="-3" width="7" height="2" fill="white"/>
  </g>

  <!-- Center cross (tallest, upright) -->
  <g transform="translate(16, 12)">
    <!-- vertical bar -->
    <rect x="-1.5" y="-8" width="3" height="16" fill="white"/>
    <!-- horizontal bar -->
    <rect x="-5" y="-4" width="10" height="2.5" fill="white"/>
  </g>

  <!-- Right cross (smaller, tilted right) -->
  <g transform="translate(24, 14) rotate(8)">
    <!-- vertical bar -->
    <rect x="-1" y="-6" width="2" height="12" fill="white"/>
    <!-- horizontal bar -->
    <rect x="-3.5" y="-3" width="7" height="2" fill="white"/>
  </g>
</svg>
